name: claude-data-gen
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # pinocchio via conda-forge avoids the cmeel-boost/numpy conflict in pip
  - conda-forge::pinocchio=3.9.0
  - pip:
    # --- IsaacSim (all tightly coupled, keep pinned) ---
    - isaacsim==5.0.0.0
    - isaacsim-benchmark==5.0.0.0
    - isaacsim-core==5.0.0.0
    - isaacsim-extscache-kit==5.0.0.0
    - isaacsim-extscache-kit-sdk==5.0.0.0
    - isaacsim-extscache-physics==5.0.0.0
    - isaacsim-gui==5.0.0.0
    - isaacsim-kernel==5.0.0.0
    - isaacsim-replicator==5.0.0.0
    - isaacsim-rl==5.0.0.0
    - isaacsim-robot==5.0.0.0
    - isaacsim-robot-motion==5.0.0.0
    - isaacsim-sensor==5.0.0.0
    - isaacsim-storage==5.0.0.0
    - isaacsim-utils==5.0.0.0
    - omniverse-kit==107.3.1.206797

    # --- PyTorch / CUDA 12.6 ---
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch==2.7.0+cu126
    - torchaudio==2.7.0+cu126
    - torchvision==0.22.0+cu126
    - triton

    # --- NumPy / numba (pinned by isaacsim-kernel) ---
    - numpy==1.26.0
    - numba==0.59.1
    - llvmlite==0.42.0

    # --- Scientific / robotics ---
    - scipy
    - matplotlib
    - sympy
    - networkx
    - shapely
    - rtree
    - trimesh
    - manifold3d
    - yourdfpy

    # --- Computer vision ---
    - opencv-python-headless
    - pillow
    - imageio

    # --- Web / API ---
    - fastapi
    - uvicorn
    - httpx
    - pydantic
    - aiohttp
    - aiofiles
    - websockets==12.0

    # --- Cloud / storage ---
    - boto3
    - azure-storage-blob
    - azure-identity

    # --- Utilities ---
    - loguru
    - tqdm
    - pyyaml
    - rich
    - click
    - psutil
    - filelock
    - colorlog
    - plotly
    - viser
    - tenacity
    - nest-asyncio
    - warp-lang

    # NOTE: anthropic is NOT listed here because isaacsim-kernel pins
    # typing-extensions==4.12.2 and anthropic requires >=4.14.
    # After the env is created, run:
    #   pip install anthropic --no-deps

prefix: /juno/u/jingyuny/.miniconda3/envs/claude-data-gen
